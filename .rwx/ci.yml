on:
  cli:
    init:
      ref: ${{ event.git.sha }}
base:
  image: python:3.11-bookworm
  config: rwx/base 1.1.1

tasks:
  - key: code
    call: git/clone 2.0.8
    with:
      repository: https://github.com/zahemen9900/agora.git
      ref: ${{ init.ref }}
      path: repo

  - key: restore-validation
    use: code
    run: |
      set -euo pipefail
      cd repo
      python -m pip install --upgrade pip
      python -m pip install -e '.[dev]'
      bash -n scripts/restore_agora_project.sh
      bash -n scripts/run_rwx_restore_validation.sh
      bash -n scripts/phase2_sdk_smoke/run.sh
      pytest -q tests/test_auth_keys.py tests/test_phase2_demo_script.py tests/test_phase2_sdk_smoke_script.py tests/test_restore_scripts.py
