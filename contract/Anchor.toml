[toolchain]
anchor_version = "1.0.0"

[features]
resolution = true
skip-lint = false

[programs.devnet]
agora = "Ha75TiGBNEYiygpDLFWBsSRwFXPX6uiGp6sbaUStJte8"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/devnet-keypair.json"

[scripts]
test = "npx ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[hooks]

[test]
startup_wait = 30000
shutdown_wait = 2000
upgradeable = false
