version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: api/Dockerfile
    ports:
      - "8000:8080"
    env_file:
      - ../.env
    volumes:
      - ../agora:/app/agora
      - ../api:/app/api
      - ./data:/app/data
    command: uvicorn api.main:app --host 0.0.0.0 --port 8080 --reload
