name: Deploy SDK

on:
  push:
    tags:
      - "sdk-v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish the built SDK to PyPI"
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/agora-arbitrator-sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build SDK
        run: python -m build sdk

      - name: Check distribution metadata
        run: python -m twine check sdk/dist/*

      - name: Publish to PyPI
        if: ${{ github.event_name == 'push' || inputs.publish }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/dist/
