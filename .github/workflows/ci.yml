name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  python-lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install uv
          uv pip install --system -e ".[dev]"
          uv pip install --system -r api/requirements.txt

      - name: Lint
        run: ruff check agora/ api/ tests/

      - name: Test
        run: pytest tests/ -v
        env:
          GOOGLE_CLOUD_PROJECT: "test-project"

  anchor-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: coral-xyz/setup-anchor@v0.3
        with:
          anchor-version: "0.30.1"

      - name: Build Anchor program
        run: |
          cd contract
          anchor build

      - name: Run Anchor tests (localnet)
        run: |
          cd contract
          anchor test

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f api/Dockerfile -t agora-api .
