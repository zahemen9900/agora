name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python-lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install uv
          uv pip install --system -e ".[dev]"
          uv pip install --system -r api/requirements.txt

      - name: Lint
        run: ruff check agora/ api/ benchmarks/ tests/ scripts/

      - name: Test
        run: pytest tests/ -v
        env:
          GOOGLE_CLOUD_PROJECT: "test-project"

  anchor-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: coral-xyz/setup-anchor@v0.3
        with:
          anchor-version: "1.0.0"

      - name: Build Anchor program
        run: |
          cd contract
          anchor build

      - name: Run Anchor tests (localnet)
        run: |
          cd contract
          anchor test --provider.cluster localnet --validator legacy

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: agora-web/package-lock.json

      - name: Install frontend dependencies
        working-directory: agora-web
        run: npm ci

      - name: Build frontend
        working-directory: agora-web
        run: npm run build

  sdk-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build SDK package
        run: |
          python -m pip install --upgrade pip build
          python -m build sdk
